name: FutureEgo

options:
  bundleIdPrefix: com.futureego
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "ATS2UB65C4"
    CODE_SIGN_STYLE: "Automatic"

targets:
  FutureEgo:
    type: application
    platform: iOS
    sources:
      - FutureEgo
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: "交联"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "需要获取您的位置来显示当地天气"
        INFOPLIST_KEY_NSCameraUsageDescription: "需要使用相机拍照来创建贴纸"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "需要访问相册来选择照片"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "需要使用麦克风进行 AI 语音通话"
        INFOPLIST_KEY_UIBackgroundModes: "voip"
        GENERATE_INFOPLIST_FILE: true
