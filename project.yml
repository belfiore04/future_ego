name: FutureEgo

options:
  bundleIdPrefix: com.futureego
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "ATS2UB65C4"
    CODE_SIGN_STYLE: "Automatic"

targets:
  FutureEgo:
    type: application
    platform: iOS
    sources:
      - FutureEgo
    # Managed Info.plist — XcodeGen writes these keys to
    # FutureEgo/Info.plist on every `xcodegen` run. We moved off the
    # auto-generated Info.plist (GENERATE_INFOPLIST_FILE + INFOPLIST_KEY_*)
    # because nested dict keys like `UILaunchScreen.UIColorName` aren't
    # expressible via the flat INFOPLIST_KEY_ namespace.
    info:
      path: FutureEgo/Info.plist
      properties:
        CFBundleDisplayName: "交联"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "需要获取您的位置来显示当地天气"
        NSCameraUsageDescription: "需要使用相机拍照来创建贴纸"
        NSPhotoLibraryUsageDescription: "需要访问相册来选择照片"
        NSMicrophoneUsageDescription: "需要使用麦克风进行 AI 语音通话"
        UIBackgroundModes:
          - voip
        # Launch screen: solid brand-green background, shown instantly by
        # iOS from app-icon tap until the first SwiftUI frame renders.
        # On Debug / free-cert this covers the 6-7 second cold start.
        UILaunchScreen:
          UIColorName: LaunchBackground
